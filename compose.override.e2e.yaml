services:
  e2e-test-runner:
    build: ./e2e
    environment:
      - DIFFICALCY_OSU_HOST=difficalcy-osu:80
      - DIFFICALCY_TAIKO_HOST=difficalcy-taiko:80
      - DIFFICALCY_CATCH_HOST=difficalcy-catch:80
      - DIFFICALCY_MANIA_HOST=difficalcy-mania:80
    depends_on:
      - difficalcy-osu
      - difficalcy-taiko
      - difficalcy-catch
      - difficalcy-mania

  beatmap-server:
    image: caddy:2-alpine
    volumes:
      - ./e2e/beatmaps:/usr/share/caddy:ro

  difficalcy-osu:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BEATMAP_DOWNLOAD_URL=http://beatmap-server:80/{beatmapId}.osu
    depends_on:
      - beatmap-server

  difficalcy-taiko:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BEATMAP_DOWNLOAD_URL=http://beatmap-server:80/{beatmapId}.osu
    depends_on:
      - beatmap-server

  difficalcy-catch:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BEATMAP_DOWNLOAD_URL=http://beatmap-server:80/{beatmapId}.osu
    depends_on:
      - beatmap-server

  difficalcy-mania:
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - BEATMAP_DOWNLOAD_URL=http://beatmap-server:80/{beatmapId}.osu
    depends_on:
      - beatmap-server
